<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0c1e33">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LMB Träning">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>LMB Träning</title>
<style>
:root {
  --bg:    #0c1e33;
  --bg2:   #122540;
  --bg3:   #1a3050;
  --teal:  #10b49a;
  --teal2: #0dd4b8;
  --gold:  #f5a623;
  --coral: #e85454;
  --green: #22c55e;
  --white: #eef3f8;
  --muted: #7a94aa;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--white);overflow:hidden;}
#app{height:100dvh;overflow:hidden;position:relative;}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;opacity:0;pointer-events:none;transform:translateX(18px);transition:opacity .22s,transform .22s;-webkit-overflow-scrolling:touch;}
.screen.active{opacity:1;pointer-events:all;transform:none;}
/* splash */
#splash{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99;transition:opacity .35s;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-logo{font-size:38px;font-weight:800;color:var(--teal);letter-spacing:1px;}
.splash-sub{font-size:12px;color:var(--muted);margin-top:4px;}
/* ── START SCREEN ── */
.start-wrap{padding:env(safe-area-inset-top,18px) 18px 8px;min-height:100dvh;display:flex;flex-direction:column;gap:12px;}
.start-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:2px;}
.brand{font-size:22px;font-weight:800;color:var(--teal);letter-spacing:.5px;}
.countdown{background:var(--bg2);border-radius:var(--r);padding:8px 13px;text-align:center;}
.cd-num{font-size:26px;font-weight:800;color:var(--white);line-height:1;}
.cd-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
/* progress card */
.pcard{background:var(--bg2);border-radius:14px;padding:14px 16px;}
.pcard-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.pcard-title{font-size:13px;font-weight:600;color:var(--white);}
.pcard-val{font-size:13px;font-weight:700;color:var(--teal);}
.pbar-track{height:7px;background:var(--bg3);border-radius:10px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:10px;transition:width .4s ease;background:var(--teal);}
.pbar-fill.gold{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
.pbar-fill.teal{background:linear-gradient(90deg,var(--teal),var(--teal2));}
/* streak card */
.streak-card{background:var(--bg2);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;}
.streak-icon{font-size:28px;line-height:1;}
.streak-body{flex:1;}
.streak-num{font-size:28px;font-weight:800;color:var(--gold);line-height:1;}
.streak-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.streak-dots{display:flex;gap:4px;margin-top:8px;}
.streak-dot{width:10px;height:10px;border-radius:50%;background:var(--bg3);}
.streak-dot.done{background:var(--gold);}
/* area rows */
.area-section{background:var(--bg2);border-radius:14px;overflow:hidden;}
.area-title-row{padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;}
.area-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;}
.area-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid #1e3448;}
.area-icon{font-size:18px;width:28px;text-align:center;}
.area-body{flex:1;}
.area-name{font-size:14px;font-weight:600;color:var(--white);}
.area-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.strength-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.strength-svag{background:#3d1a1a;color:#f87171;}
.strength-medel{background:#3d2e0a;color:#fbbf24;}
.strength-stark{background:#0d3020;color:#4ade80;}
/* action buttons */
.btn-row{display:flex;flex-direction:column;gap:10px;margin-top:4px;padding-bottom:env(safe-area-inset-bottom,12px);}
.btn{border:none;border-radius:14px;font-family:inherit;font-weight:700;cursor:pointer;transition:transform .1s,opacity .1s;}
.btn:active{transform:scale(.97);opacity:.85;}
.btn-primary{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff;padding:16px;font-size:17px;width:100%;}
.btn-secondary{background:var(--bg2);color:var(--white);padding:14px;font-size:16px;width:100%;border:1px solid var(--bg3);}
.btn-ghost{background:transparent;color:var(--muted);padding:10px;font-size:14px;width:100%;}
/* ── QUESTION SCREEN ── */
.q-wrap{padding:env(safe-area-inset-top,16px) 18px 20px;min-height:100dvh;display:flex;flex-direction:column;gap:14px;}
.q-header{display:flex;align-items:center;gap:12px;}
.q-back{background:var(--bg2);border:none;color:var(--muted);font-size:20px;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.q-meta{flex:1;}
.q-area{font-size:11px;color:var(--teal);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.q-progress-lbl{font-size:12px;color:var(--muted);}
.q-card{background:var(--bg2);border-radius:14px;padding:18px;}
.q-text{font-size:16px;font-weight:500;line-height:1.5;color:var(--white);}
.q-hint-btn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;display:block;margin-top:10px;}
.q-hint{background:var(--bg3);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--teal);margin-top:8px;display:none;}
.q-input-row{display:flex;gap:8px;align-items:center;}
.q-input{background:var(--bg2);border:2px solid var(--bg3);border-radius:12px;color:var(--white);font-size:20px;font-weight:600;padding:14px 16px;flex:1;outline:none;-webkit-appearance:none;font-family:inherit;}
.q-input:focus{border-color:var(--teal);}
.q-unit{font-size:14px;color:var(--muted);white-space:nowrap;min-width:36px;}
.feedback{border-radius:12px;padding:14px 16px;margin-top:2px;}
.feedback.correct{background:#0a2e1c;border:1px solid var(--green);}
.feedback.wrong{background:#2a0d0d;border:1px solid var(--coral);}
.fb-title{font-size:15px;font-weight:700;}
.fb-title.correct{color:var(--green);}
.fb-title.wrong{color:var(--coral);}
.fb-answer{font-size:14px;color:var(--muted);margin-top:4px;}
/* ── EXAM RESULT SCREEN ── */
.result-wrap{padding:env(safe-area-inset-top,20px) 18px 20px;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;}
.result-emoji{font-size:56px;}
.result-score{font-size:44px;font-weight:800;color:var(--white);}
.result-msg{font-size:15px;color:var(--muted);max-width:260px;line-height:1.5;}
.result-badge{background:var(--bg2);border-radius:14px;padding:14px 24px;display:inline-block;}
.result-badge.pass{border:2px solid var(--green);color:var(--green);}
.result-badge.fail{border:2px solid var(--coral);color:var(--coral);}
.result-badge-txt{font-size:16px;font-weight:700;}
/* daily done */
.daily-done-wrap{padding:env(safe-area-inset-top,20px) 18px 20px;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;}
/* ── ONBOARDING / SETTINGS ── */
.ob-wrap{padding:env(safe-area-inset-top,40px) 24px 24px;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;}
.ob-icon{font-size:52px;}
.ob-title{font-size:24px;font-weight:800;color:var(--white);}
.ob-sub{font-size:14px;color:var(--muted);line-height:1.5;max-width:280px;}
.ob-label{font-size:13px;font-weight:600;color:var(--muted);text-align:left;width:100%;max-width:320px;}
.ob-date{background:var(--bg2);border:2px solid var(--bg3);border-radius:12px;color:var(--white);font-size:18px;font-weight:600;padding:14px 16px;width:100%;max-width:320px;outline:none;font-family:inherit;-webkit-appearance:none;}
.ob-date:focus{border-color:var(--teal);}
.ob-actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px;}
.settings-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;line-height:1;}
/* scrollbar */
::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:var(--bg3);}
</style>
</head>
<body>
<div id="app">
  <div id="splash"><div class="splash-logo">LMB</div><div class="splash-sub">Träning</div></div>
  <div id="sOnboard" class="screen"></div>
  <div id="sStart"   class="screen"></div>
  <div id="sDaily"  class="screen"></div>
  <div id="sExam"   class="screen"></div>
  <div id="sResult" class="screen"></div>
</div>

<script>
// ═══════════════════════════════════════════
//  QUESTION BANK
// ═══════════════════════════════════════════
const AREAS = [
  {id:'BEGREPP',  name:'Begrepp & Enheter',    icon:'📐'},
  {id:'DOS',      name:'Dosberäkning',          icon:'💊'},
  {id:'SPADNING', name:'Spädning',              icon:'🧪'},
  {id:'INFUSION', name:'Infusion & Dropptakt',  icon:'💧'},
  {id:'SYRGAS',   name:'Syrgas',                icon:'🫁'},
];

const QS = {
BEGREPP:[
  {q:'500 mg = ? mikrogram',a:'500000',u:'µg',h:'1 mg = 1 000 µg'},
  {q:'40 mikrogram = ? mg',a:'0.04',u:'mg',h:'1 mg = 1 000 µg → 40/1000'},
  {q:'0,2 ml = ? mikroliter',a:'200',u:'µl',h:'1 ml = 1 000 µl'},

  {q:'Morfin 10 mg/ml, 4 ampuller á 1 ml → 1 mg/ml. Hur mycket NaCl?',a:'36',u:'ml',h:'4 ml × 10 mg/ml = 40 mg → 40/1 = 40 ml tot → 40–4 = 36 ml NaCl'},
  {q:'Adrenalin 1 mg/ml, 2 ml → 0,1 mg/ml. Hur mycket NaCl?',a:'18',u:'ml',h:'2×1=2 mg → 2/0,1=20 ml tot → 20–2 = 18 ml NaCl'},

  {q:'Petidin 50 mg/ml, 2 ml → 10 mg/ml. Hur mycket NaCl?',a:'8',u:'ml',h:'100 mg → 100/10=10 ml tot → 10–2 = 8 ml NaCl'},
  {q:'Petidin 50 mg/ml, 1,5 ml → 10 mg/ml. Hur mycket NaCl?',a:'6',u:'ml',h:'75 mg → 75/10=7,5 ml tot → 7,5–1,5 = 6 ml NaCl'},

  {q:'Brietal 0,5 g → styrka 10 mg/ml. Hur mycket NaCl?',a:'50',u:'ml',h:'500 mg / 10 mg/ml = 50 ml (pulvrets volym försummas)'},

  {q:'Cyklokapron 100 mg/ml 10 ml + 90 ml NaCl. Ny styrka?',a:'10',u:'mg/ml',h:'10×100 / (10+90) = 1000/100 = 10 mg/ml'},

  {q:'1 500 ml, 10 ml/kg/h, patient 65 kg. Infusionshastighet?',a:'650',u:'ml/h',h:'10×65 = 650 ml/h'},
  {q:'Ringer-Acetat 1 000 ml på 12 h, 1 ml = 20 dr. Dropptakt?',a:'28',u:'dr/min',h:'1000×20/(12×60) ≈ 27,8 → 28'},
  {q:'Ringer-Acetat 1 000 ml på 4 h. Infusionshastighet?',a:'250',u:'ml/h',h:'1000/4 = 250 ml/h'},
  {q:'500 ml Ringer-Acetat på 5 h, 1 ml = 20 dr. Dropptakt?',a:'33',u:'dr/min',h:'500×20/(5×60) = 33,3 → 33'},
  {q:'Morfin 1 mg/ml, pumpen ska ge 1,5 mg/h. Pumpinställning?',a:'1.5',u:'ml/h',h:'1,5/1 = 1,5 ml/h'},
  {q:'6 ml ska ges på 5 minuter (sprutpump). Hastighet?',a:'72',u:'ml/h',h:'6/5 × 60 = 72 ml/h'},
  {q:'Dropptakt 50 dr/min, 1 ml = 20 dr. Hur länge tar 1 000 ml? (minuter)',a:'400',u:'min',h:'1000×20/50 = 400 min (= 6 h 40 min)'},
  {q:'Dropptakt 45 dr/min, 1 ml = 20 dr, pågår 2 h. Hur mycket vätska?',a:'270',u:'ml',h:'45/20 × 120 = 270 ml'},
  {q:'Furix: 500 ml total, 250 mg furosemid, 150 ml återstår. Verksam substans given?',a:'175',u:'mg',h:'350/500 × 250 = 175 mg'},
  {q:'Xylocard: 10 ampuller á 5 ml × 20 mg/ml i 1 000 ml glukos. Halva infusionen given – verksam substans?',a:'500',u:'mg',h:'10×5×20 = 1 000 mg total. Halvt = 500 mg'},

  {q:'Addens-Natriumklorid 4 mmol/ml, ordineras 80 mmol. Hur många ml tillsätts?',a:'20',u:'ml',h:'80/4 = 20 ml'},

  {q:'Patient behöver ≥3 l/min O₂, transport 20 min, flaska 2,5 l. Lägsta tryck?',a:'24',u:'bar',h:'3×20/2,5 = 24 bar'},

  {q:'Tub 1: 3 l 150 bar. Tub 2: 10 l 200 bar. Flöde 10 l/min. Hur länge räcker?',a:'245',u:'min',h:'(450+2000)/10 = 245 min (= 4 h 5 min)'},
  {q:'Tub 1: 3 l 75 bar. Tub 2: 10 l 120 bar. Flöde 5 l/min. Hur länge räcker?',a:'285',u:'min',h:'(225+1200)/5 = 285 min (= 4 h 45 min)'},
  {q:'Flaska 10 l, 200 bar, 10 l/min. Efter 1 h visar manometern 100 bar. Verkligt flöde?',a:'16.7',u:'l/min',h:'(200-100)×10 = 1000 l på 60 min → 1000/60 ≈ 16,7 l/min'},
],
};

// Daily question pool (flat list cycling through all areas)
const DAILY_POOL = [];
const maxLen = Math.max(...AREAS.map(a=>QS[a.id].length));
for(let i=0;i<maxLen;i++){
  AREAS.forEach(a=>{if(i<QS[a.id].length) DAILY_POOL.push({...QS[a.id][i],area:a.id,areaName:a.name,areaIcon:a.icon});});
}

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const SK='lmb_v4';
function defState(){
  return {
    aStats:{BEGREPP:{r:0,t:0},DOS:{r:0,t:0},SPADNING:{r:0,t:0},INFUSION:{r:0,t:0},SYRGAS:{r:0,t:0}},
    approvedExams:0,
    totalExams:0,
    examIdx:{BEGREPP:0,DOS:0,SPADNING:0,INFUSION:0,SYRGAS:0},
    daily:{lastDate:null,streak:0,qIdx:0},
    examDate:null,
  };
}
function load(){try{return JSON.parse(localStorage.getItem(SK))||defState();}catch{return defState();}}
function save(s){localStorage.setItem(SK,JSON.stringify(s));}

let state=load();

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function todayStr(){return new Date().toISOString().split('T')[0];}
function yesterdayStr(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split('T')[0];}

function checkAns(user,q){
  const u=parseFloat(user.toString().replace(',','.').trim());
  const c=parseFloat(q.a.toString().replace(',','.').trim());
  if(isNaN(u)||isNaN(c))return false;
  const tol=Math.max(0.01*Math.abs(c),0.005);
  return Math.abs(u-c)<=tol;
}

function daysLeft(){
  const d=state.examDate||'2099-01-01';
  const exam=new Date(d);
  const today=new Date();today.setHours(0,0,0,0);
  return Math.max(0,Math.ceil((exam-today)/(86400000)));
}

function strength(a){
  if(!a||a.t===0)return null;
  const p=a.r/a.t;
  if(p>=0.75)return{label:'Stark',cls:'strength-stark'};
  if(p>=0.45)return{label:'Medel',cls:'strength-medel'};
  return{label:'Svag',cls:'strength-svag'};
}

function canDoDaily(){
  return state.daily.lastDate !== todayStr();
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
let currentScreen='sStart';
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  currentScreen=id;
}

// ═══════════════════════════════════════════
//  START SCREEN
// ═══════════════════════════════════════════
function renderStart(){
  const s=document.getElementById('sStart');
  const approved=state.approvedExams;
  const streak=state.daily.streak||0;
  const pct=Math.min(100,Math.round(approved/20*100));
  const dailyDone=!canDoDaily();

  // Streak dots (last 7 days indicator — simplified: show filled dots for streak up to 7)
  const dots=Array.from({length:7},(_,i)=>{
    const filled=streak>0 && i>=(7-Math.min(streak,7));
    return `<div class="streak-dot${filled?' done':''}"></div>`;
  }).join('');

  // Area rows
  const areaRows=AREAS.map(a=>{
    const st=state.aStats[a.id];
    const str=strength(st);
    const sub=st.t>0?`${st.r} rätt av ${st.t} besvarade`:'Ej påbörjat';
    return `<div class="area-row">
      <div class="area-icon">${a.icon}</div>
      <div class="area-body">
        <div class="area-name">${a.name}</div>
        <div class="area-sub">${sub}</div>
      </div>
      ${str?`<div class="strength-pill ${str.cls}">${str.label}</div>`:''}
    </div>`;
  }).join('');

  s.innerHTML=`<div class="start-wrap">
    <div class="start-top">
      <div class="brand">LMB Träning</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="countdown"><div class="cd-num">${daysLeft()}</div><div class="cd-lbl">dagar kvar</div></div>
        <button class="settings-btn" onclick="openSettings()" title="Ändra tentadatum">⚙️</button>
      </div>
    </div>

    <!-- Minitentor progress -->
    <div class="pcard">
      <div class="pcard-row">
        <div class="pcard-title">🎓 Godkända minitentor</div>
        <div class="pcard-val">${approved}/20</div>
      </div>
      <div class="pbar-track"><div class="pbar-fill teal" style="width:${pct}%"></div></div>
    </div>

    <!-- Streak -->
    <div class="streak-card">
      <div class="streak-icon">🔥</div>
      <div class="streak-body">
        <div style="display:flex;align-items:baseline;gap:6px;">
          <div class="streak-num">${streak}</div>
          <div style="font-size:13px;color:var(--muted);">dagar i rad</div>
        </div>
        <div class="streak-dots">${dots}</div>
      </div>
      ${dailyDone?`<div style="font-size:20px;">✅</div>`:`<div style="font-size:11px;color:var(--teal);font-weight:600;">Idag ej klar</div>`}
    </div>

    <!-- Ämnesområden -->
    <div class="area-section">
      <div class="area-title-row"><span class="area-title">Ämnesområden</span></div>
      ${areaRows}
    </div>

    <!-- Knappar -->
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="startDaily()" style="${dailyDone?'opacity:.5;pointer-events:none;':''}">
        ${dailyDone?'✅ Dagens fråga klar':'❓ Dagens fråga'}
      </button>
      <button class="btn btn-primary" onclick="startExam()">📝 Starta minitenta</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
//  ONBOARDING / SETTINGS
// ═══════════════════════════════════════════
function renderOnboard(isSettings){
  const s=document.getElementById('sOnboard');
  const cur=state.examDate||'';
  s.innerHTML=`<div class="ob-wrap">
    <div class="ob-icon">${isSettings?'⚙️':'🎓'}</div>
    <div class="ob-title">${isSettings?'Ändra tentadatum':'När är din tenta?'}</div>
    <div class="ob-sub">${isSettings?'Uppdatera datumet för din tentamen.':'Ange datumet för din läkemedelsberäkningstenta så håller appen koll på nedräkningen.'}</div>
    <div class="ob-label">Tentadatum</div>
    <input class="ob-date" type="date" id="obDate" value="${cur}" min="${todayStr()}">
    <div class="ob-actions">
      <button class="btn btn-primary" onclick="saveExamDate()">Spara datum</button>
      ${isSettings?`<button class="btn btn-ghost" onclick="goHome()">← Avbryt</button>`:''}
    </div>
  </div>`;
  setTimeout(()=>{const el=document.getElementById('obDate');if(el)el.focus();},100);
}

function saveExamDate(){
  const val=document.getElementById('obDate').value;
  if(!val)return;
  state.examDate=val;
  save(state);
  renderStart();
  showScreen('sStart');
}

function openSettings(){
  renderOnboard(true);
  showScreen('sOnboard');
}

// ═══════════════════════════════════════════
//  DAILY QUESTION
// ═══════════════════════════════════════════
let dailyQ=null;
let dailyAnswered=false;
let dailyCorrect=false;

function startDaily(){
  if(!canDoDaily())return;
  dailyQ=DAILY_POOL[state.daily.qIdx % DAILY_POOL.length];
  dailyAnswered=false;
  renderDaily();
  showScreen('sDaily');
}

function renderDaily(){
  const s=document.getElementById('sDaily');
  const q=dailyQ;
  s.innerHTML=`<div class="q-wrap">
    <div class="q-header">
      <button class="q-back" onclick="goHome()">←</button>
      <div class="q-meta">
        <div class="q-area">${q.areaIcon} ${q.areaName}</div>
        <div class="q-progress-lbl">Dagens fråga</div>
      </div>
    </div>

    <div class="q-card">
      <div class="q-text">${q.q.replace(/\n/g,'<br>')}</div>
      ${q.h?`<button class="q-hint-btn" onclick="toggleHint('dHint')">Visa tips</button><div class="q-hint" id="dHint">💡 ${q.h}</div>`:''}
    </div>

    ${!dailyAnswered?`
      <div class="q-input-row">
        <input class="q-input" id="dInput" type="number" inputmode="decimal" placeholder="Svar" autocomplete="off">
        <span class="q-unit">${q.u}</span>
      </div>
      <button class="btn btn-primary" onclick="submitDaily()">Kontrollera ✓</button>
    `:`
      <div class="feedback ${dailyCorrect?'correct':'wrong'}">
        <div class="fb-title ${dailyCorrect?'correct':'wrong'}">${dailyCorrect?'✓ Rätt!':'✗ Fel'}</div>
        <div class="fb-answer">Rätt svar: ${q.a} ${q.u}</div>
      </div>
      <button class="btn btn-ghost" onclick="goHome()">← Tillbaka</button>
    `}
  </div>`;

  if(!dailyAnswered){
    const inp=document.getElementById('dInput');
    inp.focus();
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')submitDaily();});
  }
}

function submitDaily(){
  const inp=document.getElementById('dInput');
  const val=inp?inp.value.trim():'';
  if(!val)return;
  dailyCorrect=checkAns(val,dailyQ);
  dailyAnswered=true;

  // Update stats
  state.aStats[dailyQ.area].t++;
  if(dailyCorrect)state.aStats[dailyQ.area].r++;

  // Streak
  const today=todayStr();
  const yesterday=yesterdayStr();
  if(state.daily.lastDate===yesterday){
    state.daily.streak=(state.daily.streak||0)+1;
  } else if(state.daily.lastDate!==today){
    state.daily.streak=1;
  }
  state.daily.lastDate=today;
  state.daily.qIdx=(state.daily.qIdx||0)+1;
  save(state);
  renderDaily();
}

// ═══════════════════════════════════════════
//  MINI-EXAM
// ═══════════════════════════════════════════
let examQs=[];    // [{area, q, answered, correct, userVal}, ...]
let examCurrent=0;
let examAnswered=false;

function startExam(){
  // Pick one question per area using rotation index
  examQs=AREAS.map(a=>{
    const pool=QS[a.id];
    const idx=state.examIdx[a.id]||0;
    const q=pool[idx%pool.length];
    return{area:a.id,areaName:a.name,areaIcon:a.icon,q,answered:false,correct:false,userVal:''};
  });
  // Advance indices
  AREAS.forEach(a=>{state.examIdx[a.id]=((state.examIdx[a.id]||0)+1)%QS[a.id].length;});
  save(state);

  examCurrent=0;
  examAnswered=false;
  renderExam();
  showScreen('sExam');
}

function renderExam(){
  const s=document.getElementById('sExam');
  const item=examQs[examCurrent];
  const q=item.q;
  const n=examQs.length;
  const done=item.answered;

  s.innerHTML=`<div class="q-wrap">
    <div class="q-header">
      <button class="q-back" onclick="confirmExitExam()">←</button>
      <div class="q-meta">
        <div class="q-area">${item.areaIcon} ${item.areaName}</div>
        <div class="q-progress-lbl">Fråga ${examCurrent+1} av ${n}</div>
      </div>
    </div>

    <div class="q-card">
      <div class="q-text">${q.q.replace(/\n/g,'<br>')}</div>
      ${q.h?`<button class="q-hint-btn" onclick="toggleHint('eHint')">Visa tips</button><div class="q-hint" id="eHint">💡 ${q.h}</div>`:''}
    </div>

    ${!done?`
      <div class="q-input-row">
        <input class="q-input" id="eInput" type="number" inputmode="decimal" placeholder="Svar" autocomplete="off">
        <span class="q-unit">${q.u}</span>
      </div>
      <button class="btn btn-primary" onclick="submitExamQ()">Kontrollera ✓</button>
    `:`
      <div class="feedback ${item.correct?'correct':'wrong'}">
        <div class="fb-title ${item.correct?'correct':'wrong'}">${item.correct?'✓ Rätt!':'✗ Fel'}</div>
        <div class="fb-answer">Rätt svar: ${q.a} ${q.u}</div>
      </div>
      ${examCurrent<n-1
        ?`<button class="btn btn-primary" onclick="nextExamQ()">Nästa fråga →</button>`
        :`<button class="btn btn-primary" onclick="finishExam()">Se resultat</button>`
      }
    `}
  </div>`;

  if(!done){
    const inp=document.getElementById('eInput');
    inp.focus();
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')submitExamQ();});
  }
}

function submitExamQ(){
  const inp=document.getElementById('eInput');
  const val=inp?inp.value.trim():'';
  if(!val)return;
  const item=examQs[examCurrent];
  item.userVal=val;
  item.correct=checkAns(val,item.q);
  item.answered=true;

  // Track area stats
  state.aStats[item.area].t++;
  if(item.correct)state.aStats[item.area].r++;
  save(state);
  renderExam();
}

function nextExamQ(){
  examCurrent++;
  renderExam();
}

function finishExam(){
  const correct=examQs.filter(x=>x.correct).length;
  const total=examQs.length;
  const passed=correct===total; // 100% required

  state.totalExams++;
  if(passed)state.approvedExams++;
  save(state);

  renderResult(correct,total,passed);
  showScreen('sResult');
}

function renderResult(correct,total,passed){
  const s=document.getElementById('sResult');
  s.innerHTML=`<div class="result-wrap">
    <div class="result-emoji">${passed?'🎉':'📊'}</div>
    <div class="result-score">${correct}/${total}</div>
    <div class="${passed?'result-badge pass':'result-badge fail'}">
      <div class="result-badge-txt">${passed?'✓ GODKÄND – räknas mot ditt mål!':'✗ Ej godkänd – alla rätt krävs'}</div>
    </div>
    <div class="result-msg">
      ${passed
        ?`Bra jobbat! Du har nu ${state.approvedExams} av 20 godkända minitentor.`
        :`Fortsätt öva! Tentan kräver 100 % rätt för att räknas.`}
    </div>
    <div class="btn-row" style="width:100%;margin-top:8px;">
      <button class="btn btn-primary" onclick="startExam()">Gör ny minitenta</button>
      <button class="btn btn-ghost" onclick="goHome()">← Hem</button>
    </div>
  </div>`;
}

function confirmExitExam(){
  if(confirm('Avbryta pågående minitenta?'))goHome();
}

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
function toggleHint(id){
  const el=document.getElementById(id);
  if(el)el.style.display=el.style.display==='block'?'none':'block';
}
function goHome(){
  renderStart();
  showScreen('sStart');
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
function init(){
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
  if(!state.examDate){
    renderOnboard(false);
    showScreen('sOnboard');
  } else {
    renderStart();
    showScreen('sStart');
  }
  setTimeout(()=>{
    const sp=document.getElementById('splash');
    sp.classList.add('hide');
    setTimeout(()=>sp.remove(),380);
  },500);
}
window.addEventListener('load',init);
</script>
