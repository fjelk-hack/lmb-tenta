<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f2640">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LMB Träning">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>LMB Träning – Läkemedelsberäkning</title>
  <style>
    :root {
      --navy: #0f2640;
      --navy2: #1a3a5c;
      --teal: #0e8c7a;
      --teal-light: #13b3a0;
      --coral: #e8534a;
      --gold: #f0a500;
      --gold-bg: rgba(240,165,0,0.15);
      --cream: #f7f3ee;
      --white: #ffffff;
      --gray1: #eef1f4;
      --gray2: #c8d0da;
      --gray3: #8a97a8;
      --text: #1a2b3c;
      --r: 14px;
      --rCard: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--text);
      font-size: 18px;
    }

    #app {
      height: 100dvh;
      display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }

    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      transition: opacity 0.22s ease, transform 0.22s ease;
      opacity: 0; pointer-events: none; transform: translateX(18px);
      overflow: hidden;
    }
    .screen.active { opacity: 1; pointer-events: all; transform: translateX(0); }

    /* ═══════════════════════════
       START SCREEN
    ═══════════════════════════ */
    #startScreen {
      background: linear-gradient(160deg, #091b30 0%, #0f2640 55%, #0d2a44 100%);
      padding: 0 20px;
      display: flex; flex-direction: column;
    }

    .start-header {
      padding: calc(env(safe-area-inset-top, 0px) + 22px) 0 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .app-brand { display: flex; flex-direction: column; }
    .app-title {
      font-family: 'Lora', serif;
      font-size: 26px; font-weight: 700;
      color: var(--white); line-height: 1;
    }
    .app-subtitle {
      font-size: 13px; color: var(--gray3); letter-spacing: 1.2px;
      text-transform: uppercase; margin-top: 4px;
    }
    .countdown-block { display: flex; flex-direction: column; align-items: flex-end; }
    .countdown-num {
      font-family: 'Lora', serif;
      font-size: 36px; font-weight: 700; color: var(--white); line-height: 1;
    }
    .countdown-label { font-size: 12px; color: var(--gray3); letter-spacing: 1px; text-transform: uppercase; }

    /* Overview card */
    .overview-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--rCard);
      padding: 12px 15px;
      margin-bottom: 10px;
    }
    .overview-stats {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 10px;
    }
    .stat-block { display: flex; flex-direction: column; }
    .stat-num {
      font-family: 'Lora', serif;
      font-size: 34px; font-weight: 700; color: var(--white); line-height: 1;
    }
    .stat-num.accent { color: var(--teal-light); }
    .stat-label { font-size: 14px; color: var(--gray3); margin-top: 3px; }

    .progress-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }
    .progress-title { font-size: 13px; color: rgba(255,255,255,0.45); }
    .progress-pct { font-size: 14px; color: var(--teal-light); font-weight: 600; }
    .progress-track {
      height: 8px; background: rgba(255,255,255,0.08);
      border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--teal), var(--teal-light));
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      position: relative;
    }
    .progress-fill-passed {
      height: 100%; border-radius: 99px;
      background: rgba(255,255,255,0.22);
      position: absolute; top: 0; left: 0;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }
    .progress-sub {
      font-size: 12px; color: rgba(255,255,255,0.28); margin-top: 5px;
      display: flex; justify-content: space-between;
    }

    /* Area rows */
    .areas-label {
      font-size: 13px; color: var(--gray3); letter-spacing: 1.5px;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .area-rows { display: flex; flex-direction: column; gap: 5px; }

    .area-row {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 13px;
      padding: 9px 13px;
      display: flex; align-items: center; gap: 11px;
    }
    .area-row-icon { font-size: 22px; flex-shrink: 0; }
    .area-row-body { flex: 1; min-width: 0; }
    .area-row-top {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .area-row-name {
      font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.88);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Strength pill */
    .strength-pill {
      font-size: 12px; font-weight: 700; letter-spacing: 0.4px;
      text-transform: uppercase; padding: 3px 10px;
      border-radius: 99px; flex-shrink: 0;
      display: flex; align-items: center; gap: 4px;
    }
    .pill-none  { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.35); }
    .pill-svag  { background: rgba(232,83,74,0.2);    color: #ff8077; }
    .pill-medel { background: rgba(240,165,0,0.2);    color: #ffc43d; }
    .pill-stark { background: rgba(19,179,160,0.2);   color: var(--teal-light); }

    .area-row-sub { font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 3px; }

    /* Buttons */
    .start-buttons {
      display: flex; flex-direction: column; gap: 8px;
      margin-top: auto;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
    }
    .btn {
      width: 100%; padding: 14px 20px;
      border-radius: var(--r); border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 19px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: opacity 0.15s, transform 0.15s;
      -webkit-appearance: none;
    }
    .btn:active { opacity: 0.84; transform: scale(0.98); }
    .btn-teal    { background: linear-gradient(135deg, var(--teal), var(--teal-light)); color: white; }
    .btn-outline {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.88);
    }
    .btn-icon { font-size: 21px; }

    /* ═══════════════════════════
       EXAM SCREEN
    ═══════════════════════════ */
    #examScreen { background: var(--cream); }

    .exam-topbar {
      background: var(--navy);
      padding: calc(env(safe-area-inset-top, 12px) + 8px) 20px 13px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .exam-meta { display: flex; flex-direction: column; }
    .exam-label { font-size: 13px; color: var(--gray3); letter-spacing: 1.2px; text-transform: uppercase; }
    .exam-title { font-size: 18px; font-weight: 600; color: white; margin-top: 2px; }

    .exit-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 9px; padding: 8px 15px;
      font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.8);
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .exit-btn:active { opacity: 0.7; }

    /* Thin progress line */
    .exam-progress-bar { height: 3px; background: rgba(0,0,0,0.08); }
    .exam-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal), var(--teal-light));
      transition: width 0.4s ease;
    }

    /* Area tag inside exam */
    .q-area-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--gray1); border-radius: 8px;
      padding: 5px 11px; margin-bottom: 10px;
      font-size: 15px; font-weight: 600; color: var(--navy2);
    }

    .exam-body {
      flex: 1; overflow-y: auto;
      padding: 14px 20px 0;
      display: flex; flex-direction: column; gap: 11px;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .exam-body::-webkit-scrollbar { display: none; }

    .question-card {
      background: var(--white); border-radius: var(--rCard);
      padding: 16px 18px; box-shadow: 0 2px 14px rgba(0,0,0,0.07);
    }
    .question-number {
      font-size: 13px; font-weight: 600; letter-spacing: 1.8px;
      text-transform: uppercase; color: var(--gray3); margin-bottom: 8px;
    }
    .question-text {
      font-size: 19px; line-height: 1.6; color: var(--navy); font-weight: 400;
    }
    .question-text strong { font-weight: 700; }
    .question-hint {
      margin-top: 10px; padding: 9px 13px;
      background: rgba(14,140,122,0.07); border-radius: 10px;
      border-left: 3px solid var(--teal); font-size: 16px; color: var(--navy2);
      line-height: 1.5;
    }

    .answer-section {
      background: var(--white); border-radius: var(--rCard);
      padding: 13px 18px; box-shadow: 0 2px 14px rgba(0,0,0,0.07);
    }
    .answer-label {
      font-size: 13px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--gray3); margin-bottom: 8px;
    }
    .answer-row { display: flex; align-items: center; gap: 10px; }
    .answer-input {
      flex: 1; padding: 12px 15px;
      border: 2px solid var(--gray2); border-radius: 12px;
      font-size: 20px; font-family: 'DM Sans', sans-serif;
      color: var(--navy); outline: none;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    .answer-input:focus { border-color: var(--teal); }
    .answer-input.correct { border-color: var(--teal); background: rgba(14,140,122,0.05); }
    .answer-input.wrong   { border-color: var(--coral); background: rgba(232,83,74,0.05); }
    .answer-unit { font-size: 17px; font-weight: 500; color: var(--gray3); min-width: 44px; }

    .feedback-msg {
      margin-top: 8px; padding: 10px 13px;
      border-radius: 11px; font-size: 17px; font-weight: 500; display: none;
      line-height: 1.4;
    }
    .feedback-msg.correct { display: block; background: rgba(14,140,122,0.09); color: var(--teal); }
    .feedback-msg.wrong   { display: block; background: rgba(232,83,74,0.09); color: #c0392b; }

    .exam-footer {
      padding: 10px 20px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 10px);
      background: var(--cream);
    }
    .question-dots { display: flex; gap: 7px; justify-content: center; margin-bottom: 8px; }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--gray2); transition: all 0.2s;
    }
    .dot.active   { background: var(--navy); transform: scale(1.4); }
    .dot.done-ok  { background: var(--teal-light); }
    .dot.done-fail{ background: var(--coral); }

    /* ═══════════════════════════
       DAILY SCREEN
    ═══════════════════════════ */
    #dailyScreen { background: var(--cream); }
    .daily-topbar {
      background: var(--navy2);
      padding: calc(env(safe-area-inset-top, 12px) + 8px) 20px 13px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .daily-title { font-size: 18px; font-weight: 600; color: white; }

    /* ═══════════════════════════
       RESULT SCREEN
    ═══════════════════════════ */
    #resultScreen {
      background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 26px; text-align: center;
    }
    .result-icon   { font-size: 58px; margin-bottom: 10px; }
    .result-title  { font-family: 'Lora', serif; font-size: 32px; font-weight: 700; color: var(--navy); }
    .result-subtitle { font-size: 18px; color: var(--gray3); margin-top: 6px; line-height: 1.5; }
    .result-score  {
      background: var(--white); border-radius: 22px;
      padding: 14px 38px; margin: 14px 0;
      box-shadow: 0 4px 22px rgba(0,0,0,0.09);
    }
    .result-score-num { font-family: 'Lora', serif; font-size: 52px; font-weight: 700; color: var(--teal); line-height: 1; }
    .result-score-text { font-size: 16px; color: var(--gray3); margin-top: 4px; }

    /* Per-area breakdown in result */
    .result-area-list {
      width: 100%; max-width: 340px;
      display: flex; flex-direction: column; gap: 5px;
      margin-bottom: 14px;
    }
    .ral-row {
      background: var(--white); border-radius: 12px;
      padding: 9px 14px;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    .ral-icon { font-size: 20px; }
    .ral-name { flex: 1; font-size: 16px; font-weight: 500; color: var(--navy); }
    .ral-result { font-size: 18px; }

    .result-buttons { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 340px; }

    /* ═══════════════════════════
       SPLASH
    ═══════════════════════════ */
    #splash {
      position: fixed; inset: 0; z-index: 999; background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      transition: opacity 0.4s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    .splash-icon  { font-size: 50px; }
    .splash-title { font-family: 'Lora', serif; font-size: 22px; font-weight: 700; color: white; }
    .splash-sub   { font-size: 13px; color: var(--gray3); letter-spacing: 1.5px; text-transform: uppercase; }
  </style>
</head>
<body>

<div id="splash">
  <div class="splash-icon">💊</div>
  <div class="splash-title">LMB Träning</div>
  <div class="splash-sub">Laddar...</div>
</div>

<div id="app">

  <!-- ══════════════════════════════
       START SCREEN
  ══════════════════════════════ -->
  <div id="startScreen" class="screen">
    <div class="start-header">
      <div class="app-brand">
        <div class="app-title">LMB Träning 💊</div>
        <div class="app-subtitle">Läkemedelsberäkning</div>
      </div>
      <div class="countdown-block">
        <div class="countdown-num" id="daysCount">–</div>
        <div class="countdown-label">dagar kvar</div>
      </div>
    </div>

    <div class="overview-card">
      <div class="overview-stats">
        <div class="stat-block">
          <div class="stat-num accent" id="conductedCount">0</div>
          <div class="stat-label">genomförda</div>
        </div>
        <div class="stat-block" style="text-align:right">
          <div class="stat-num" id="passedCount">0</div>
          <div class="stat-label">godkända</div>
        </div>
      </div>
      <div class="progress-header">
        <div class="progress-title">Totalt framsteg</div>
        <div class="progress-pct" id="progressPct">0%</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%">
          <div class="progress-fill-passed" id="progressPassed" style="width:0%"></div>
        </div>
      </div>
      <div class="progress-sub">
        <span id="progressSubLeft">0 av 20 minitentor genomförda</span>
        <span>7 apr 2026</span>
      </div>
    </div>

    <div class="areas-label">Ämnesområden</div>
    <div class="area-rows" id="areaRows"></div>

    <div class="start-buttons">
      <button class="btn btn-teal" onclick="startDaily()">
        <span class="btn-icon">🎲</span> Dagens fråga
      </button>
      <button class="btn btn-outline" onclick="startExam()">
        <span class="btn-icon">📝</span> Starta minitenta
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════
       EXAM SCREEN
  ══════════════════════════════ -->
  <div id="examScreen" class="screen">
    <div class="exam-topbar">
      <div class="exam-meta">
        <div class="exam-label">Minitenta <span id="examNum"></span> av 20</div>
        <div class="exam-title">Läkemedelsberäkning</div>
      </div>
      <button class="exit-btn" onclick="confirmExit()">Avsluta ✕</button>
    </div>
    <div class="exam-progress-bar">
      <div class="exam-progress-fill" id="examProgressFill" style="width:0%"></div>
    </div>

    <div class="exam-body">
      <div class="question-card">
        <div class="q-area-tag" id="qAreaTag"></div>
        <div class="question-number" id="qNumber"></div>
        <div class="question-text" id="qText"></div>
        <div class="question-hint" id="qHint" style="display:none"></div>
      </div>
      <div class="answer-section">
        <div class="answer-label">Ditt svar</div>
        <div class="answer-row">
          <input type="text" class="answer-input" id="answerInput"
            inputmode="decimal" placeholder="Skriv svar här..."
            autocomplete="off" autocorrect="off" spellcheck="false"
            onkeydown="if(event.key==='Enter') submitAnswer()">
          <div class="answer-unit" id="answerUnit"></div>
        </div>
        <div class="feedback-msg" id="feedbackMsg"></div>
      </div>
    </div>

    <div class="exam-footer">
      <div class="question-dots" id="questionDots"></div>
      <button class="btn btn-teal" id="examActionBtn" onclick="submitAnswer()">
        Kontrollera svar →
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════
       DAILY SCREEN
  ══════════════════════════════ -->
  <div id="dailyScreen" class="screen">
    <div class="daily-topbar">
      <div class="daily-title">🎲 Slumpad fråga</div>
      <button class="exit-btn" onclick="showScreen('startScreen')">Avsluta ✕</button>
    </div>

    <div class="exam-body" id="dailyBody">
      <div class="question-card">
        <div class="q-area-tag" id="dqAreaTag"></div>
        <div class="question-text" id="dqText"></div>
        <div class="question-hint" id="dqHint" style="display:none"></div>
      </div>
      <div class="answer-section">
        <div class="answer-label">Ditt svar</div>
        <div class="answer-row">
          <input type="text" class="answer-input" id="dailyAnswerInput"
            inputmode="decimal" placeholder="Skriv svar här..."
            autocomplete="off" autocorrect="off" spellcheck="false"
            onkeydown="if(event.key==='Enter') submitDailyAnswer()">
          <div class="answer-unit" id="dailyAnswerUnit"></div>
        </div>
        <div class="feedback-msg" id="dailyFeedbackMsg"></div>
      </div>
    </div>

    <div class="exam-footer">
      <button class="btn btn-teal" id="dailyActionBtn" onclick="submitDailyAnswer()">
        Kontrollera svar →
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════
       RESULT SCREEN
  ══════════════════════════════ -->
  <div id="resultScreen" class="screen">
    <div class="result-icon" id="resultIcon">🎉</div>
    <div class="result-title" id="resultTitle">Godkänt!</div>
    <div class="result-subtitle" id="resultSubtitle"></div>
    <div class="result-score">
      <div class="result-score-num" id="resultScoreNum">5/5</div>
      <div class="result-score-text">rätta svar</div>
    </div>
    <div class="result-area-list" id="resultAreaList"></div>
    <div class="result-buttons">
      <button class="btn btn-teal" id="resultNextBtn" onclick="startExam()">
        Nästa minitenta →
      </button>
      <button class="btn btn-outline" onclick="showScreen('startScreen')" style="color:white;">
        Tillbaka till start
      </button>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
//  FRÅGEDATABAS
// ═══════════════════════════════════════════════════════
const AREAS = [
  {
    id: 0, name: 'Begrepp & Enheter', icon: '🧮',
    questions: [
      { q: 'Avrunda <strong>0,886</strong> till en decimals noggrannhet.', a: '0.9', unit: '', hint: 'Titta på andra decimalen: 8 ≥ 5 → avrunda uppåt.' },
      { q: 'Avrunda <strong>0,496</strong> till en decimals noggrannhet.', a: '0.5', unit: '' },
      { q: 'Avrunda <strong>0,1536</strong> till två decimalers noggrannhet.', a: '0.15', unit: '', hint: 'Titta på tredje decimalen: 3 < 5 → behåll.' },
      { q: 'Avrunda <strong>0,265562</strong> till tre decimalers noggrannhet.', a: '0.266', unit: '', tol: 0.0005 },
      { q: 'Avrunda <strong>1,2449</strong> till en decimals noggrannhet.', a: '1.2', unit: '' },
      { q: '500 milligram = ______ mikrogram', a: '500000', unit: 'µg', hint: '1 mg = 1 000 µg' },
      { q: '40 mikrogram = ______ milligram', a: '0.04', unit: 'mg', hint: '1 µg = 0,001 mg' },
      { q: '0,2 milliliter = ______ mikroliter', a: '200', unit: 'µl', hint: '1 ml = 1 000 µl' },
      { q: '1 gram = ______ milligram', a: '1000', unit: 'mg' },
      { q: '2,5 gram = ______ milligram', a: '2500', unit: 'mg' },

//  KONSTANTER
// ═══════════════════════════════════════════════════════
const EXAM_DATE        = new Date('2026-04-07T08:00:00');
const TOTAL_EXAMS      = 20;
const QUESTIONS_PER_EXAM = 5;  // 1 per area

// State
// miniExamResults[i] = null | true | false   (i = 0..19)
// areaStats[areaId] = { right: N, total: N }
let state = {
  miniExamResults: Array(TOTAL_EXAMS).fill(null),
  areaStats: AREAS.map(() => ({ right: 0, total: 0 }))
};

// Current session
let session = {
  examIndex: 0,
  questions: [],   // [{...question, areaId, areaName, areaIcon}, ...]
  currentQ: 0,
  answers: []      // true/false per question
};

// Daily
let daily = { questions: [], currentQ: 0, showingAnswer: false };

// ═══════════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════════
function loadState() {
  try {
    const s = localStorage.getItem('lmb_v3');
    if (s) {
      const p = JSON.parse(s);
      if (p.miniExamResults) state.miniExamResults = p.miniExamResults;
      if (p.areaStats)       state.areaStats = p.areaStats;
    }
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem('lmb_v3', JSON.stringify(state)); } catch(e) {}
}

// ═══════════════════════════════════════════════════════
//  BERÄKNINGAR
// ═══════════════════════════════════════════════════════
function daysUntilExam() {
  return Math.max(0, Math.ceil((EXAM_DATE - new Date()) / 86400000));
}
function conductedCount() { return state.miniExamResults.filter(r => r !== null).length; }
function passedCount()    { return state.miniExamResults.filter(r => r === true).length; }
function nextExamIndex()  {
  const i = state.miniExamResults.findIndex(r => r !== true);
  return i === -1 ? TOTAL_EXAMS - 1 : i;
}

// Strength per area: based on % right
function areaStrength(areaId) {
  const s = state.areaStats[areaId];
  if (s.total === 0) return 'none';
  const pct = s.right / s.total;
  if (pct >= 0.75) return 'stark';
  if (pct >= 0.45) return 'medel';
  return 'svag';
}
function strengthLabel(str) {
  return { none: 'Ej börjad', svag: '⚠ Svag', medel: '~ Medel', stark: '✓ Stark' }[str];
}
function strengthClass(str) {
  return { none: 'pill-none', svag: 'pill-svag', medel: 'pill-medel', stark: 'pill-stark' }[str];
}

// ═══════════════════════════════════════════════════════
//  SKÄRMBYTE
// ═══════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'startScreen') renderStart();
}

// ═══════════════════════════════════════════════════════
//  STARTSKÄRM
// ═══════════════════════════════════════════════════════
function renderStart() {
  document.getElementById('daysCount').textContent = daysUntilExam();

  const conducted = conductedCount();
  const passed    = passedCount();

  document.getElementById('conductedCount').textContent = conducted;
  document.getElementById('passedCount').textContent    = passed;

  const cPct = conducted / TOTAL_EXAMS * 100;
  const oPct = conducted > 0 ? passed / conducted * 100 : 0;

  document.getElementById('progressFill').style.width   = cPct + '%';
  document.getElementById('progressPassed').style.width = oPct + '%';
  document.getElementById('progressPct').textContent    = Math.round(cPct) + '%';
  document.getElementById('progressSubLeft').textContent = `${conducted} av ${TOTAL_EXAMS} minitentor genomförda`;

  // Area rows
  const container = document.getElementById('areaRows');
  container.innerHTML = '';

  AREAS.forEach(area => {
    const str    = areaStrength(area.id);
    const st     = state.areaStats[area.id];
    const subTxt = st.total > 0
      ? `${st.right} rätt av ${st.total} besvarade frågor`
      : 'Inga frågor besvarade än';

    container.innerHTML += `
      <div class="area-row">
        <div class="area-row-icon">${area.icon}</div>
        <div class="area-row-body">
          <div class="area-row-top">
            <div class="area-row-name">${area.name}</div>
            <div class="strength-pill ${strengthClass(str)}">${strengthLabel(str)}</div>
          </div>
          <div class="area-row-sub">${subTxt}</div>
        </div>
      </div>`;
  });
}

// ═══════════════════════════════════════════════════════
//  BYGG MINITENTA – 1 fråga per ämnesområde
// ═══════════════════════════════════════════════════════
function buildExamQuestions(examIndex) {
  return AREAS.map(area => {
    // Rotate through questions so each exam gets a different question
    const q = area.questions[examIndex % area.questions.length];
    return { ...q, areaId: area.id, areaName: area.name, areaIcon: area.icon };
  });
}

// ═══════════════════════════════════════════════════════
//  SVARSKONTROLL
// ═══════════════════════════════════════════════════════
function checkAnswer(val, q) {
  if (!val.trim()) return false;
  const raw = val.trim().replace(',', '.');
  const nu = parseFloat(raw);
  const nc = parseFloat(q.a);
  const tol = q.tol !== undefined ? q.tol : 0.01;
  if (!isNaN(nu) && !isNaN(nc)) {
    return Math.abs(nu - nc) <= Math.max(tol, Math.abs(nc) * 0.005);
  }
  return raw.toLowerCase() === String(q.a).toLowerCase();
}

// ═══════════════════════════════════════════════════════
//  STARTA MINITENTA
// ═══════════════════════════════════════════════════════
function startExam() {
  const idx = nextExamIndex();
  session = {
    examIndex: idx,
    questions: buildExamQuestions(idx),
    currentQ: 0,
    answers: []
  };
  renderExamQuestion();
  showScreen('examScreen');
}

function renderExamQuestion() {
  const q   = session.questions[session.currentQ];
  const num = session.currentQ + 1;

  document.getElementById('examNum').textContent      = session.examIndex + 1;
  document.getElementById('examProgressFill').style.width = ((num - 1) / QUESTIONS_PER_EXAM * 100) + '%';
  document.getElementById('qNumber').textContent      = `FRÅGA ${num} AV ${QUESTIONS_PER_EXAM}`;
  document.getElementById('qAreaTag').innerHTML       = `${q.areaIcon} ${q.areaName}`;
  document.getElementById('qText').innerHTML          = q.q.replace(/\n/g, '<br>');

  const hintEl = document.getElementById('qHint');
  hintEl.style.display = 'none';
  if (q.hint) hintEl.textContent = '💡 ' + q.hint;

  document.getElementById('answerUnit').textContent   = q.unit || '';
  document.getElementById('answerInput').value        = '';
  document.getElementById('answerInput').className    = 'answer-input';
  document.getElementById('feedbackMsg').className    = 'feedback-msg';
  document.getElementById('feedbackMsg').textContent  = '';

  const btn = document.getElementById('examActionBtn');
  btn.textContent = 'Kontrollera svar →';
  btn.onclick = submitAnswer;

  // Dots
  let dots = '';
  for (let i = 0; i < QUESTIONS_PER_EXAM; i++) {
    let cls = i < session.currentQ
      ? (session.answers[i] ? 'done-ok' : 'done-fail')
      : i === session.currentQ ? 'active' : '';
    dots += `<div class="dot ${cls}"></div>`;
  }
  document.getElementById('questionDots').innerHTML = dots;

  document.getElementById('examActionBtn').scrollIntoView && document.getElementById('examActionBtn').scrollIntoView(false);
  setTimeout(() => document.getElementById('answerInput').focus(), 300);
}

function submitAnswer() {
  const input = document.getElementById('answerInput');
  const val   = input.value.trim();
  if (!val) { flash(input); return; }

  const q       = session.questions[session.currentQ];
  const correct = checkAnswer(val, q);
  session.answers.push(correct);

  // Update area stats
  state.areaStats[q.areaId].total++;
  if (correct) state.areaStats[q.areaId].right++;

  input.className = 'answer-input ' + (correct ? 'correct' : 'wrong');
  const fb = document.getElementById('feedbackMsg');

  if (correct) {
    fb.className   = 'feedback-msg correct';
    fb.textContent = `✓ Rätt! Svaret är ${q.a}${q.unit ? ' ' + q.unit : ''}`;
  } else {
    fb.className   = 'feedback-msg wrong';
    fb.textContent = `✗ Fel. Rätt svar: ${q.a}${q.unit ? ' ' + q.unit : ''}`;
    if (q.hint) document.getElementById('qHint').style.display = 'block';
  }

  const btn = document.getElementById('examActionBtn');
  btn.onclick     = nextQuestion;
  btn.textContent = session.currentQ + 1 < QUESTIONS_PER_EXAM ? 'Nästa fråga →' : 'Se resultat →';
}

function nextQuestion() {
  session.currentQ++;
  if (session.currentQ >= QUESTIONS_PER_EXAM) showResult();
  else renderExamQuestion();
}

function flash(el) {
  el.style.borderColor = 'var(--coral)';
  setTimeout(() => el.style.borderColor = '', 500);
}

// ═══════════════════════════════════════════════════════
//  RESULTATSKÄRM
// ═══════════════════════════════════════════════════════
function showResult() {
  const correct = session.answers.filter(Boolean).length;
  const passed  = correct === QUESTIONS_PER_EXAM;

  state.miniExamResults[session.examIndex] = passed;
  saveState();

  document.getElementById('resultIcon').textContent     = passed ? '🎉' : '😤';
  document.getElementById('resultTitle').textContent    = passed ? 'Godkänt!' : 'Inte godkänt';
  document.getElementById('resultScoreNum').textContent = `${correct}/${QUESTIONS_PER_EXAM}`;
  document.getElementById('resultScoreNum').style.color = passed ? 'var(--teal)' : 'var(--coral)';

  if (passed) {
    const remaining = state.miniExamResults.filter(r => r !== true).length;
    document.getElementById('resultSubtitle').textContent =
      remaining > 0
        ? `${passedCount()} av ${TOTAL_EXAMS} minitentor godkända totalt.`
        : 'Alla 20 minitentor godkända! 🏆';
  } else {
    document.getElementById('resultSubtitle').textContent =
      `Du behöver 5/5 för godkänt. Försök igen!`;
  }

  // Per-area breakdown
  const list = document.getElementById('resultAreaList');
  list.innerHTML = '';
  session.questions.forEach((q, i) => {
    const ok = session.answers[i];
    list.innerHTML += `
      <div class="ral-row">
        <div class="ral-icon">${q.areaIcon}</div>
        <div class="ral-name">${q.areaName}</div>
        <div class="ral-result">${ok ? '✅' : '❌'}</div>
      </div>`;
  });

  // Next button
  const nextBtn = document.getElementById('resultNextBtn');
  if (!passed) {
    nextBtn.textContent = 'Försök igen →';
    nextBtn.onclick     = startExam;
    nextBtn.style.display = '';
  } else if (passedCount() < TOTAL_EXAMS) {
    nextBtn.textContent = 'Nästa minitenta →';
    nextBtn.onclick     = startExam;
    nextBtn.style.display = '';
  } else {
    nextBtn.style.display = 'none';
  }

  showScreen('resultScreen');
}

function confirmExit() {
  if (confirm('Avsluta minitentan och gå tillbaka till startmenyn?')) showScreen('startScreen');
}

// ═══════════════════════════════════════════════════════
//  DAGLIG FRÅGA
// ═══════════════════════════════════════════════════════
function startDaily() {
  const allQ = [];
  AREAS.forEach(a => a.questions.forEach(q =>
    allQ.push({...q, areaId: a.id, areaName: a.name, areaIcon: a.icon})
  ));
  for (let i = allQ.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allQ[i], allQ[j]] = [allQ[j], allQ[i]];
  }
  daily = { questions: allQ, currentQ: 0, showingAnswer: false };
  renderDaily();
  showScreen('dailyScreen');
}

function renderDaily() {
  if (daily.currentQ >= daily.questions.length) { showScreen('startScreen'); return; }
  const q = daily.questions[daily.currentQ];
  document.getElementById('dqAreaTag').innerHTML      = `${q.areaIcon} ${q.areaName}`;
  document.getElementById('dqText').innerHTML         = q.q.replace(/\n/g, '<br>');
  document.getElementById('dqHint').style.display     = 'none';
  if (q.hint) document.getElementById('dqHint').textContent = '💡 ' + q.hint;
  document.getElementById('dailyAnswerUnit').textContent = q.unit || '';
  document.getElementById('dailyAnswerInput').value   = '';
  document.getElementById('dailyAnswerInput').className = 'answer-input';
  document.getElementById('dailyFeedbackMsg').className = 'feedback-msg';
  document.getElementById('dailyFeedbackMsg').textContent = '';
  document.getElementById('dailyActionBtn').textContent   = 'Kontrollera svar →';
  document.getElementById('dailyActionBtn').onclick       = submitDailyAnswer;
  daily.showingAnswer = false;
  setTimeout(() => document.getElementById('dailyAnswerInput').focus(), 300);
}

function submitDailyAnswer() {
  if (daily.showingAnswer) { daily.currentQ++; renderDaily(); return; }
  const input = document.getElementById('dailyAnswerInput');
  const val   = input.value.trim();
  if (!val) { flash(input); return; }

  const q       = daily.questions[daily.currentQ];
  const correct = checkAnswer(val, q);

  // Track stats per area (same as exam questions)
  state.areaStats[q.areaId].total++;
  if (correct) state.areaStats[q.areaId].right++;
  saveState();

  input.className = 'answer-input ' + (correct ? 'correct' : 'wrong');
  const fb = document.getElementById('dailyFeedbackMsg');
  if (correct) {
    fb.className   = 'feedback-msg correct';
    fb.textContent = `✓ Rätt! Svaret är ${q.a}${q.unit ? ' ' + q.unit : ''}`;
  } else {
    fb.className   = 'feedback-msg wrong';
    fb.textContent = `✗ Fel. Rätt svar: ${q.a}${q.unit ? ' ' + q.unit : ''}`;
    if (q.hint) document.getElementById('dqHint').style.display = 'block';
  }

  daily.showingAnswer = true;
  document.getElementById('dailyActionBtn').textContent = 'Nästa fråga →';
  document.getElementById('dailyActionBtn').onclick = () => { daily.currentQ++; renderDaily(); };
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
function init() {
  loadState();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  renderStart();
  showScreen('startScreen');
  setTimeout(() => {
    const s = document.getElementById('splash');
    s.classList.add('hide');
    setTimeout(() => s.remove(), 400);
  }, 500);
}
window.addEventListener('load', init);
</script>
